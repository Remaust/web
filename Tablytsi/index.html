<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Таблиці</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

<table>
    <tr>
        <td style="background-color: #ffc080">1</td>
        <td style="background-color: #ffc080">2</td>
        <td style="background-color: #ffc080">3</td>
        <td style="background-color: #ffc080">4</td>
    </tr>
    <tr>
        <td style="background-color: #ffc080">5</td>
        <td rowspan="2" style="background-color: #268bff">6</td>
        <td style="background-color: #ffc080">7</td>
        <td style="background-color: #ffc080">8</td>
    </tr>
    <tr>
        <td style="background-color: #ffc080">9</td>

        <td style="background-color: #ffc080">11</td>
        <td style="background-color: #ffc080">12</td>
    </tr>
    <tr>
        <td style="background-color: #ffc080">13</td>
        <td style="background-color: #FF0000">14</td>
        <td style="background-color: #ffc080">15</td>
        <td style="background-color: #ffc080">16</td>
    </tr>
    <tr>
        <td style="background-color: #ffc080">17</td>
        <td style="background-color: #FF0000">18</td>
        <td style="background-color: #ffc080">19</td>
        <td style="background-color: #ffc080">20</td>
    </tr>
    <tr>
        <td style="background-color: #ffc080">21</td>
        <td style="background-color: #FF0000">22</td>
        <td style="background-color: #ffc080">23</td>
        <td style="background-color: #ffc080">24</td>
    </tr>
    <tr>
        <td style="background-color: #ffc080">25</td>
        <td colspan="3" style="background-color: #92ff94">26</td>
    </tr>
    <tr>
        <td style="background-color: #ffc080">29</td>
        <td style="background-color: #268bff">30</td>
        <td style="background-color: #268bff">31</td>
        <td style="background-color: #268bff">32</td>
    </tr>
</table>

</body>
</html>
